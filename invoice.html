<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>書類作成アプリ - 株式会社えこぷろ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: #f8fafc; color: #1e293b; min-height: 100vh; }
input, select, textarea { font-family: 'Noto Sans JP', sans-serif; }
input:focus, select:focus, textarea:focus { outline: 2px solid #3b82f6; border-color: #3b82f6; }
button { font-family: 'Noto Sans JP', sans-serif; }
.header { background: #1e293b; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
.header-title { color: #fff; font-weight: 700; font-size: 18px; }
.header-btns { margin-left: auto; display: flex; gap: 8px; }
.btn { padding: 6px 18px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; transition: background 0.2s; color: #fff; }
.btn-edit { background: #334155; }
.btn-preview { background: #334155; }
.btn-print { background: #f59e0b; }
.btn.active { }
.main { max-width: 900px; margin: 0 auto; padding: 20px 16px; }
.card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 16px; }
.card-label { font-weight: 700; margin-bottom: 12px; font-size: 14px; color: #64748b; }
.doc-type-btns { display: flex; gap: 10px; }
.doc-type-btn { flex: 1; padding: 12px 0; border-radius: 8px; border: 2px solid #e2e8f0; background: #fff; color: #64748b; font-weight: 700; cursor: pointer; font-size: 15px; transition: all 0.2s; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-2-wide { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.field { }
.field-label { font-size: 12px; color: #94a3b8; margin-bottom: 4px; font-weight: 600; }
.field input, .field select { width: 100%; padding: 7px 10px; border-radius: 6px; border: 1px solid #e2e8f0; font-size: 14px; background: #f8fafc; }
.items-header { display: grid; grid-template-columns: 3fr 1fr 1fr 2fr 32px; gap: 6px; font-size: 12px; color: #94a3b8; font-weight: 600; margin-bottom: 6px; }
.item-row { display: grid; grid-template-columns: 3fr 1fr 1fr 2fr 32px; gap: 6px; align-items: center; margin-bottom: 6px; }
.item-row input { width: 100%; padding: 7px 10px; border-radius: 6px; border: 1px solid #e2e8f0; font-size: 14px; background: #f8fafc; }
.btn-remove { width: 28px; height: 28px; border-radius: 6px; border: none; background: #fee2e2; color: #dc2626; cursor: pointer; font-weight: 700; font-size: 14px; }
.btn-add-row { margin-top: 4px; padding: 8px 0; border-radius: 8px; width: 100%; font-weight: 700; cursor: pointer; font-size: 13px; border: 2px dashed; }
.total-section { margin-top: 16px; display: flex; justify-content: flex-end; }
.total-box { min-width: 220px; font-size: 14px; }
.total-row { display: flex; justify-content: space-between; padding: 3px 0; color: #64748b; }
.total-tax-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 3px 0; color: #64748b; }
.tax-select { padding: 2px 4px; border-radius: 6px; border: 1px solid #e2e8f0; font-size: 13px; background: #f8fafc; width: 60px; }
.total-final { font-weight: 800; font-size: 18px; display: flex; justify-content: space-between; border-top: 2px solid; padding-top: 8px; margin-top: 4px; }
.note-area { width: 100%; padding: 7px 10px; border-radius: 6px; border: 1px solid #e2e8f0; font-size: 14px; background: #f8fafc; resize: vertical; }

/* Preview styles */
#preview-area { background: #fff; border-radius: 12px; padding: 40px 48px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); max-width: 740px; margin: 0 auto; }
.preview-title-band { text-align: center; margin-bottom: 32px; }
.preview-title-inner { display: inline-block; color: #fff; font-size: 26px; font-weight: 900; padding: 6px 48px; border-radius: 4px; letter-spacing: 8px; }
.preview-meta { display: flex; justify-content: flex-end; gap: 24px; font-size: 13px; color: #64748b; margin-bottom: 24px; }
.preview-header { display: flex; justify-content: space-between; margin-bottom: 28px; align-items: flex-start; }
.preview-client-name { font-size: 22px; font-weight: 800; }
.preview-client-addr { font-size: 12px; color: #64748b; }
.preview-sender { text-align: right; font-size: 13px; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.preview-sender-logo { width: 56px; height: 56px; object-fit: contain; margin-bottom: 4px; }
.preview-sender-name { font-weight: 700; font-size: 16px; }
.preview-sender-sub { color: #64748b; }
.preview-subject { border-left: 4px solid; padding: 8px 16px; border-radius: 0 6px 6px 0; font-weight: 700; margin-bottom: 20px; }
.preview-amount-box { border: 1px solid; border-radius: 8px; padding: 12px 24px; margin-bottom: 24px; text-align: center; }
.preview-amount-label { font-size: 12px; color: #64748b; margin-bottom: 2px; }
.preview-amount-value { font-size: 30px; font-weight: 900; }
.preview-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px; }
.preview-table th { padding: 8px 10px; font-weight: 700; color: #fff; }
.preview-table td { padding: 7px 10px; border-bottom: 1px solid #e2e8f0; }
.preview-totals { display: flex; justify-content: flex-end; }
.preview-totals-box { min-width: 240px; font-size: 13px; }
.preview-total-row { display: flex; justify-content: space-between; padding: 3px 0; color: #64748b; }
.preview-total-final { display: flex; justify-content: space-between; font-weight: 800; font-size: 16px; border-top: 2px solid; padding-top: 8px; margin-top: 4px; }
.preview-note { margin-top: 28px; border-top: 1px solid #e2e8f0; padding-top: 16px; }
.preview-note-label { font-weight: 700; font-size: 12px; color: #64748b; margin-bottom: 6px; }
.preview-note-text { font-size: 13px; white-space: pre-wrap; color: #334155; }

@media print {
  body * { visibility: hidden !important; }
  #preview-area, #preview-area * { visibility: visible !important; }
  #preview-area { position: fixed; top: 0; left: 0; width: 100%; border-radius: 0; box-shadow: none; }
}
@media (max-width: 600px) {
  .grid-2, .grid-2-wide { grid-template-columns: 1fr; }
  .items-header, .item-row { grid-template-columns: 2fr 1fr 1fr 1.5fr 28px; }
  #preview-area { padding: 20px 16px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">📄 書類作成アプリ</div>
  <div class="header-btns">
    <button class="btn btn-edit active" id="btnEdit" onclick="switchView('edit')">✏️ 編集</button>
    <button class="btn btn-preview" id="btnPreview" onclick="switchView('preview')">👁 プレビュー</button>
    <button class="btn btn-print" onclick="doPrint()">🖨️ 印刷/PDF</button>
  </div>
</div>

<div class="main">
  <!-- EDIT VIEW -->
  <div id="editView">
    <!-- 書類タイプ -->
    <div class="card">
      <div class="card-label">書類の種類</div>
      <div class="doc-type-btns">
        <button class="doc-type-btn" id="btn_estimate" onclick="setDocType('estimate')">見積書</button>
        <button class="doc-type-btn" id="btn_invoice" onclick="setDocType('invoice')">請求書</button>
        <button class="doc-type-btn" id="btn_receipt" onclick="setDocType('receipt')">領収書</button>
      </div>
    </div>
    <!-- 基本情報 -->
    <div class="card">
      <div class="card-label">基本情報</div>
      <div class="grid-2">
        <div class="field"><div class="field-label">書類番号</div><input type="text" id="docNo" value="" oninput="update()"></div>
        <div class="field"><div class="field-label">発行日</div><input type="date" id="issueDate" oninput="update()"></div>
        <div class="field" id="dueDateField"><div class="field-label" id="dueDateLabel">見積有効期限</div><input type="date" id="dueDate" oninput="update()"></div>
        <div class="field"><div class="field-label">件名</div><input type="text" id="title" placeholder="例）定期清掃業務" oninput="update()"></div>
      </div>
    </div>
    <!-- 宛先・発行者 -->
    <div class="card">
      <div class="grid-2-wide">
        <div>
          <div class="card-label">宛先</div>
          <div style="display:grid;gap:8px">
            <div class="field"><div class="field-label">会社名・お名前</div><input type="text" id="clientName" oninput="update()"></div>
            <div class="field"><div class="field-label">住所</div><input type="text" id="clientAddress" oninput="update()"></div>
          </div>
        </div>
        <div>
          <div class="card-label">発行者</div>
          <div style="display:grid;gap:8px">
            <div class="field"><div class="field-label">会社名・氏名</div><input type="text" id="senderName" oninput="update()"></div>
            <div class="field"><div class="field-label">住所</div><input type="text" id="senderAddress" oninput="update()"></div>
            <div class="field"><div class="field-label">電話番号</div><input type="text" id="senderTel" oninput="update()"></div>
            <div class="field"><div class="field-label">メール</div><input type="text" id="senderEmail" oninput="update()"></div>
          </div>
        </div>
      </div>
    </div>
    <!-- 明細 -->
    <div class="card">
      <div class="card-label">明細</div>
      <div class="items-header">
        <span>品目・内容</span><span>数量</span><span>単位</span><span>単価（円）</span><span></span>
      </div>
      <div id="itemsContainer"></div>
      <button class="btn-add-row" id="btnAddRow" onclick="addItem()">＋ 行を追加</button>
      <div class="total-section">
        <div class="total-box">
          <div class="total-row"><span>小計</span><span id="subtotalEdit">¥0</span></div>
          <div class="total-tax-row">
            <span>消費税</span>
            <span style="display:flex;align-items:center;gap:4px">
              <select class="tax-select" id="taxRate" onchange="update()">
                <option value="10">10%</option>
                <option value="8">8%</option>
                <option value="0">0%</option>
              </select>
              <span id="taxEdit">¥0</span>
            </span>
          </div>
          <div class="total-final" id="totalFinalEdit"><span>合計</span><span id="totalEdit">¥0</span></div>
        </div>
      </div>
    </div>
    <!-- 備考 -->
    <div class="card">
      <div class="card-label">備考・振込先など</div>
      <textarea class="note-area" id="note" rows="3" placeholder="例）お振込先：○○銀行 ○○支店 普通 1234567　口座名義：株式会社えこぷろ" oninput="update()"></textarea>
    </div>
  </div>

  <!-- PREVIEW VIEW -->
  <div id="previewView" style="display:none">
    <div id="preview-area">
      <div class="preview-title-band">
        <div class="preview-title-inner" id="previewTitle">見積書</div>
      </div>
      <div class="preview-meta">
        <span id="previewDocNo">No. </span>
        <span id="previewIssueDate">発行日: </span>
        <span id="previewDueDate" style="display:none"></span>
      </div>
      <div class="preview-header">
        <div>
          <div class="preview-client-addr" id="previewClientAddr" style="display:none"></div>
          <div class="preview-client-name"><span id="previewClientName">○○株式会社</span> 御中</div>
        </div>
        <div class="preview-sender">

const DOC_TYPES = {
  estimate: { label: "見積書", color: "#2563eb", accent: "#dbeafe" },
  invoice:  { label: "請求書", color: "#16a34a", accent: "#dcfce7" },
  receipt:  { label: "領収書", color: "#9333ea", accent: "#f3e8ff" },
};

let items = [newItem()];
let docType = "estimate";
let itemId = 1;

function newItem() { return { id: itemId++, name: "", qty: 1, unit: "式", price: 0 }; }

function fmt(n) { return Number(n||0).toLocaleString("ja-JP"); }

// Init
window.onload = function() {
  document.getElementById("docNo").value = new Date().getFullYear() + "-001";
  document.getElementById("issueDate").value = new Date().toISOString().slice(0,10);
  document.getElementById("senderName").value = "株式会社えこぷろ";
  document.getElementById("senderAddress").value = "〒815-0032 福岡県福岡市南区塩原3-22-1-402";
  document.getElementById("senderTel").value = "050-3110-0353";
  document.getElementById("senderEmail").value = "Info@ecopro092.com";
  document.querySelector('.preview-sender-logo').src = LOGO_B64;
  setDocType("estimate");
  renderItems();
  update();
};

function setDocType(type) {
  docType = type;
  const info = DOC_TYPES[type];
  Object.keys(DOC_TYPES).forEach(k => {
    const btn = document.getElementById("btn_" + k);
    if (k === type) {
      btn.style.border = "2px solid " + DOC_TYPES[k].color;
      btn.style.background = DOC_TYPES[k].accent;
      btn.style.color = DOC_TYPES[k].color;
    } else {
      btn.style.border = "2px solid #e2e8f0";
      btn.style.background = "#fff";
      btn.style.color = "#64748b";
    }
  });
  // header btn color
  document.getElementById("btnEdit").style.background = info.color;
  document.getElementById("btnPreview").style.background = (document.getElementById("previewView").style.display === "none") ? "#334155" : info.color;
  // due date label
  document.getElementById("dueDateLabel").textContent = type === "invoice" ? "お支払期限" : "見積有効期限";
  document.getElementById("dueDateField").style.display = type === "receipt" ? "none" : "";
  // add row button
  document.getElementById("btnAddRow").style.borderColor = info.color;
  document.getElementById("btnAddRow").style.background = info.accent;
  document.getElementById("btnAddRow").style.color = info.color;
  // total color
  document.getElementById("totalFinalEdit").style.borderTopColor = info.color;
  document.getElementById("totalFinalEdit").style.color = info.color;
  update();
}

function switchView(v) {
  const info = DOC_TYPES[docType];
  if (v === "edit") {
    document.getElementById("editView").style.display = "";
    document.getElementById("previewView").style.display = "none";
    document.getElementById("btnEdit").style.background = info.color;
    document.getElementById("btnPreview").style.background = "#334155";
  } else {
    document.getElementById("editView").style.display = "none";
    document.getElementById("previewView").style.display = "";
    document.getElementById("btnEdit").style.background = "#334155";
    document.getElementById("btnPreview").style.background = info.color;
    updatePreview();
  }
}

function addItem() {
  items.push(newItem());
  renderItems();
  update();
}

function removeItem(id) {
  items = items.filter(i => i.id !== id);
  renderItems();
  update();
}

function renderItems() {
  const c = document.getElementById("itemsContainer");
  c.innerHTML = "";
  items.forEach(item => {
    const row = document.createElement("div");
    row.className = "item-row";
    row.innerHTML = `
      <input type="text" value="${item.name}" placeholder="清掃作業費" oninput="setItem(${item.id},'name',this.value)">
      <input type="number" value="${item.qty}" min="0" oninput="setItem(${item.id},'qty',this.value)">
      <input type="text" value="${item.unit}" oninput="setItem(${item.id},'unit',this.value)">
      <input type="number" value="${item.price}" min="0" oninput="setItem(${item.id},'price',this.value)">
      <button class="btn-remove" onclick="removeItem(${item.id})">×</button>
    `;
    c.appendChild(row);
  });
}

function setItem(id, key, val) {
  const item = items.find(i => i.id === id);
  if (item) { item[key] = val; update(); }
}

function calcTotals() {
  const subtotal = items.reduce((s,i) => s + Number(i.qty)*Number(i.price), 0);
  const taxRate = Number(document.getElementById("taxRate").value);
  const tax = Math.floor(subtotal * taxRate / 100);
  return { subtotal, tax, total: subtotal + tax, taxRate };
}

function update() {
  const { subtotal, tax, total } = calcTotals();
  document.getElementById("subtotalEdit").textContent = "¥" + fmt(subtotal);
  document.getElementById("taxEdit").textContent = "¥" + fmt(tax);
  document.getElementById("totalEdit").textContent = "¥" + fmt(total);
}

function updatePreview() {
  const info = DOC_TYPES[docType];
  const { subtotal, tax, total, taxRate } = calcTotals();
  const g = id => document.getElementById(id);

  g("previewTitle").textContent = info.label;
  g("previewTitle").style.background = info.color;
  g("previewDocNo").textContent = "No. " + g("docNo").value;
  g("previewIssueDate").textContent = "発行日: " + g("issueDate").value;

  const due = g("dueDate").value;
  if (due && docType !== "receipt") {
    g("previewDueDate").style.display = "";
    g("previewDueDate").textContent = (docType === "invoice" ? "支払期限: " : "有効期限: ") + due;
  } else {
    g("previewDueDate").style.display = "none";
  }

  const clientName = g("clientName").value || "○○株式会社";
  g("previewClientName").textContent = clientName;
  const clientAddr = g("clientAddress").value;
  if (clientAddr) { g("previewClientAddr").style.display = ""; g("previewClientAddr").textContent = clientAddr; }
  else { g("previewClientAddr").style.display = "none"; }

  g("previewSenderName").textContent = g("senderName").value;
  const addr = g("senderAddress").value;
  if (addr) { g("previewSenderAddr").style.display = ""; g("previewSenderAddr").textContent = addr; }
  else g("previewSenderAddr").style.display = "none";
  const tel = g("senderTel").value;
  if (tel) { g("previewSenderTel").style.display = ""; g("previewSenderTel").textContent = "TEL: " + tel; }
  else g("previewSenderTel").style.display = "none";
  const email = g("senderEmail").value;
  if (email) { g("previewSenderEmail").style.display = ""; g("previewSenderEmail").textContent = email; }
  else g("previewSenderEmail").style.display = "none";

  const subj = g("title").value;
  if (subj) {
    g("previewSubject").style.display = "";
    g("previewSubject").textContent = "件名: " + subj;
    g("previewSubject").style.background = info.accent;
    g("previewSubject").style.borderLeftColor = info.color;
  } else { g("previewSubject").style.display = "none"; }

  g("previewAmountBox").style.borderColor = info.color;
  g("previewAmountLabel").textContent = (docType === "receipt" ? "領収金額" : "ご請求金額") + "（税込）";
  g("previewTotal").textContent = "¥" + fmt(total);
  g("previewTotal").style.color = info.color;

  g("previewTableHead").style.background = info.color;
  const tbody = g("previewTableBody");
  tbody.innerHTML = "";
  items.filter(i => i.name).forEach((item, idx) => {
    const amt = Number(item.qty) * Number(item.price);
    const tr = document.createElement("tr");
    tr.style.background = idx % 2 === 0 ? "#fff" : "#f8fafc";
    tr.innerHTML = `
      <td>${item.name}</td>
      <td style="text-align:right">${item.qty}</td>
      <td style="text-align:right">${item.unit}</td>
      <td style="text-align:right">¥${fmt(item.price)}</td>
      <td style="text-align:right">¥${fmt(amt)}</td>
    `;
    tbody.appendChild(tr);
  });

  g("previewSubtotal").textContent = "¥" + fmt(subtotal);
  g("previewTaxLabel").textContent = "消費税（" + taxRate + "%）";
  g("previewTax").textContent = "¥" + fmt(tax);
  g("previewTotalFinal").style.borderTopColor = info.color;
  g("previewTotalFinal").style.color = info.color;
  g("previewTotalFinal2").textContent = "¥" + fmt(total);

  const note = g("note").value;
  if (note) { g("previewNoteSection").style.display = ""; g("previewNoteText").textContent = note; }
  else g("previewNoteSection").style.display = "none";
}

function doPrint() {
  if (document.getElementById("previewView").style.display === "none") {
    switchView("preview");
    setTimeout(() => window.print(), 300);
  } else {
    window.print();
  }
}
</script>
</body>
</html>
