<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>書類作成アプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh}
input,select,textarea,button{font-family:'Noto Sans JP',sans-serif}
.hdr{background:#1e293b;padding:12px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.hdr-ttl{color:#fff;font-weight:700;font-size:16px}
.hdr-btns{margin-left:auto;display:flex;gap:8px}
.hbtn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-weight:700;font-size:13px;color:#fff;background:#334155}
.pbtn{background:#f59e0b}
.main{max-width:900px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 6px rgba(0,0,0,.07);margin-bottom:14px}
.clbl{font-weight:700;font-size:13px;color:#64748b;margin-bottom:10px}
.dtype-row{display:flex;gap:10px}
.dtbtn{flex:1;padding:11px 0;border-radius:8px;border:2px solid #e2e8f0;background:#fff;color:#64748b;font-weight:700;cursor:pointer;font-size:14px;transition:all .15s}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g2b{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.fl{font-size:12px;color:#94a3b8;font-weight:600;margin-bottom:3px}
.fi{width:100%;padding:7px 10px;border-radius:6px;border:1px solid #e2e8f0;font-size:14px;background:#f8fafc}
.fi:focus{outline:2px solid #3b82f6;border-color:#3b82f6}
.ihdrs{display:grid;grid-template-columns:3fr 1fr 1fr 2fr 32px;gap:6px;font-size:12px;color:#94a3b8;font-weight:600;margin-bottom:6px}
.irow{display:grid;grid-template-columns:3fr 1fr 1fr 2fr 32px;gap:6px;align-items:center;margin-bottom:6px}
.irow .fi{padding:7px 8px}
.rbtn{width:28px;height:28px;border-radius:6px;border:none;background:#fee2e2;color:#dc2626;cursor:pointer;font-weight:700;font-size:15px;line-height:1}
.addbtn{margin-top:6px;padding:9px 0;border-radius:8px;width:100%;font-weight:700;cursor:pointer;font-size:13px;border:2px dashed #2563eb;background:#dbeafe;color:#2563eb}
.tbox{margin-top:14px;display:flex;justify-content:flex-end}
.tinner{min-width:220px;font-size:14px}
.trow{display:flex;justify-content:space-between;padding:3px 0;color:#64748b}
.ttax{display:flex;align-items:center;justify-content:space-between;padding:3px 0;color:#64748b;gap:6px}
.tsel{padding:3px 6px;border-radius:6px;border:1px solid #e2e8f0;font-size:13px;background:#f8fafc;width:64px}
.tfinal{font-weight:800;font-size:17px;display:flex;justify-content:space-between;border-top:2px solid #2563eb;padding-top:8px;margin-top:4px;color:#2563eb}
.nota{width:100%;padding:8px 10px;border-radius:6px;border:1px solid #e2e8f0;font-size:14px;background:#f8fafc;resize:vertical}
.nota:focus{outline:2px solid #3b82f6}
/* Preview */
#pvArea{background:#fff;border-radius:12px;padding:36px 44px;box-shadow:0 2px 10px rgba(0,0,0,.08);max-width:740px;margin:0 auto}
.pvttl{text-align:center;margin-bottom:26px}
.pvttl-in{display:inline-block;color:#fff;font-size:23px;font-weight:900;padding:6px 40px;border-radius:4px;letter-spacing:8px}
.pvmeta{display:flex;justify-content:flex-end;gap:18px;font-size:12px;color:#64748b;margin-bottom:18px;flex-wrap:wrap}
.pvhdr{display:flex;justify-content:space-between;margin-bottom:22px;align-items:flex-start;gap:10px}
.pvcn{font-size:20px;font-weight:800}
.pvca{font-size:12px;color:#64748b;margin-bottom:3px}
.pvsndr{text-align:right;font-size:13px;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.pvlogo{width:56px;height:56px;object-fit:contain;margin-bottom:3px}
.pvsn{font-weight:700;font-size:15px}
.pvss{color:#64748b;font-size:12px}
.pvsubj{border-left:4px solid;padding:8px 14px;border-radius:0 6px 6px 0;font-weight:700;margin-bottom:16px}
.pvamt{border:1px solid;border-radius:8px;padding:10px 20px;margin-bottom:18px;text-align:center}
.pvamt-l{font-size:12px;color:#64748b;margin-bottom:2px}
.pvamt-v{font-size:26px;font-weight:900}
.pvtbl{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px}
.pvtbl th{padding:7px 9px;font-weight:700;color:#fff}
.pvtbl td{padding:6px 9px;border-bottom:1px solid #e2e8f0}
.pvtots{display:flex;justify-content:flex-end}
.pvti{min-width:230px;font-size:13px}
.pvtr{display:flex;justify-content:space-between;padding:3px 0;color:#64748b}
.pvtf{display:flex;justify-content:space-between;font-weight:800;font-size:15px;border-top:2px solid;padding-top:7px;margin-top:3px}
.pvnts{margin-top:22px;border-top:1px solid #e2e8f0;padding-top:12px}
.pvntl{font-weight:700;font-size:12px;color:#64748b;margin-bottom:4px}
.pvntt{font-size:13px;white-space:pre-wrap;color:#334155}
@media print{
  @page{margin:10mm;size:A4}
  body{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  #pvArea{page-break-after:avoid;page-break-inside:avoid;box-shadow:none!important;border-radius:0!important;padding:10mm!important;max-width:100%!important;margin:0!important}
  * {page-break-inside: avoid}
  
  .hdr{display:none!important}
  #editView{display:none!important}
  #pvView{display:block!important}
}
@media(max-width:600px){
  .g2,.g2b{grid-template-columns:1fr}
  .ihdrs,.irow{grid-template-columns:2fr 1fr 1fr 1.5fr 28px}
  #pvArea{padding:18px 12px}
  .pvttl-in{font-size:18px;padding:5px 24px}
}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-ttl">📄 書類作成アプリ</div>
  <div class="hdr-btns">
    <button class="hbtn" id="btnEdit">✏️ 編集</button>
    <button class="hbtn" id="btnPrev">👁 プレビュー</button>
    <button class="hbtn pbtn" id="btnPrint">🖨️ 印刷/PDF</button>
  </div>
</div>

<div class="main">
  <div id="editView">
    <div class="card">
      <div class="clbl">書類の種類</div>
      <div class="dtype-row">
        <button class="dtbtn" id="dt_estimate">見積書</button>
        <button class="dtbtn" id="dt_invoice">請求書</button>
        <button class="dtbtn" id="dt_receipt">領収書</button>
      </div>
    </div>
    <div class="card">
      <div class="clbl">基本情報</div>
      <div class="g2">
        <div><div class="fl">書類番号</div><input class="fi" id="f_no"></div>
        <div><div class="fl">発行日</div><input class="fi" type="date" id="f_date"></div>
        <div id="dueWrap"><div class="fl" id="dueLbl">見積有効期限</div><input class="fi" type="date" id="f_due"></div>
        <div><div class="fl">件名</div><input class="fi" id="f_title" placeholder="定期清掃業務 等"></div>
      </div>
    </div>
    <div class="card">
      <div class="g2b">
        <div>
          <div class="clbl">宛先</div>
          <div style="display:grid;gap:8px">
            <div><div class="fl">会社名・お名前</div><input class="fi" id="f_cname" placeholder="○○株式会社"></div>
            <div><div class="fl">住所</div><input class="fi" id="f_caddr" placeholder="住所（任意）"></div>
          </div>
        </div>
        <div>
          <div class="clbl">発行者</div>
          <div style="display:grid;gap:8px">
            <div><div class="fl">会社名・氏名</div><input class="fi" id="f_sname"></div>
            <div><div class="fl">住所</div><input class="fi" id="f_saddr"></div>
            <div><div class="fl">電話番号</div><input class="fi" id="f_stel"></div>
            <div><div class="fl">メール</div><input class="fi" id="f_semail"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="clbl">明細</div>
      <div class="ihdrs"><span>品目・内容</span><span>数量</span><span>単位</span><span>単価（円）</span><span></span></div>
      <div id="itemsWrap"></div>
      <button class="addbtn" id="addBtn">＋ 行を追加</button>
      <div class="tbox"><div class="tinner">
        <div class="trow"><span>小計</span><span id="t_sub">¥0</span></div>
        <div class="ttax">
          <span>消費税</span>
          <span style="display:flex;align-items:center;gap:6px">
            <select class="tsel" id="f_tax">
              <option value="10">10%</option>
              <option value="8">8%</option>
              <option value="0">0%</option>
            </select>
            <span id="t_tax">¥0</span>
          </span>
        </div>
        <div class="tfinal" id="t_finalRow"><span>合計</span><span id="t_total">¥0</span></div>
      </div></div>
    </div>
    <div class="card">
      <div class="clbl">備考・振込先など</div>
      <textarea class="nota" id="f_note" rows="3" placeholder="例）振込先：○○銀行 ○○支店 普通 1234567　口座名義：株式会社えこぷろ"></textarea>
    </div>
  </div>

  <div id="pvView" style="display:none">
    <div id="pvArea">
      <div class="pvttl"><div class="pvttl-in" id="pv_ttl">見積書</div></div>
      <div class="pvmeta">
        <span id="pv_no"></span>
        <span id="pv_date"></span>
        <span id="pv_due" style="display:none"></span>
      </div>
      <div class="pvhdr">
        <div>
          <div class="pvca" id="pv_ca" style="display:none"></div>
          <div class="pvcn"><span id="pv_cn">○○株式会社</span> 御中</div>
        </div>
        <div class="pvsndr">
          <img id="pv_logo" class="pvlogo" alt="logo">
          <div class="pvsn" id="pv_sn"></div>
          <div class="pvss" id="pv_sa" style="display:none"></div>
          <div class="pvss" id="pv_st" style="display:none"></div>
          <div class="pvss" id="pv_se" style="display:none"></div>
          <div class="pvss" id="pv_reg" style="display:none"></div>
        </div>
      </div>
      <div class="pvsubj" id="pv_subj" style="display:none"></div>
      <div class="pvamt" id="pv_amtbox">
        <div class="pvamt-l" id="pv_amtl">ご請求金額（税込）</div>
        <div class="pvamt-v" id="pv_amt">¥0</div>
      </div>
      <table class="pvtbl">
        <thead><tr id="pv_th"><th style="text-align:left">品目・内容</th><th style="text-align:right">数量</th><th style="text-align:right">単位</th><th style="text-align:right">単価</th><th style="text-align:right">金額</th></tr></thead>
        <tbody id="pv_tb"></tbody>
      </table>
      <div class="pvtots"><div class="pvti">
        <div class="pvtr"><span>小計</span><span id="pv_sub">¥0</span></div>
        <div class="pvtr"><span id="pv_taxl">消費税（10%）</span><span id="pv_tax">¥0</span></div>
        <div class="pvtf" id="pv_tf"><span>合計</span><span id="pv_tot">¥0</span></div>
      </div></div>
      <div class="pvnts" id="pv_nts" style="display:none">
        <div class="pvntl">備考</div>
        <div class="pvntt" id="pv_ntt"></div>
      </div>
    </div>
  </div>
</div>

  g("btnPrint").addEventListener("click", doPrint);
  g("addBtn").addEventListener("click",   addRow);
  g("f_tax").addEventListener("change",   calcTotal);

  addRow();
  setType("estimate");
}

// ---------- 書類タイプ ----------
function setType(t) {
  curType = t;
  var info = TYPES[t];
  ["estimate","invoice","receipt"].forEach(function(k) {
    var btn = g("dt_" + k);
    if (k === t) {
      btn.style.border     = "2px solid " + TYPES[k].color;
      btn.style.background = TYPES[k].accent;
      btn.style.color      = TYPES[k].color;
    } else {
      btn.style.border     = "2px solid #e2e8f0";
      btn.style.background = "#fff";
      btn.style.color      = "#64748b";
    }
  });
  g("btnEdit").style.background = info.color;
  if (t === "receipt") {
    g("dueWrap").style.display = "none";
  } else {
    g("dueWrap").style.display = "";
    g("dueLbl").textContent = (t === "invoice") ? "お支払期限" : "見積有効期限";
  }
  g("addBtn").style.borderColor = info.color;
  g("addBtn").style.background  = info.accent;
  g("addBtn").style.color       = info.color;
  g("t_finalRow").style.borderTopColor = info.color;
  g("t_finalRow").style.color          = info.color;
  calcTotal();
}

// ---------- 明細行 ----------
function addRow() {
  var id = nextId++;
  items.push({ id: id, name: "", qty: 1, unit: "式", price: 0 });
  renderRows();
  calcTotal();
}

function removeRow(id) {
  items = items.filter(function(i) { return i.id !== id; });
  renderRows();
  calcTotal();
}

function renderRows() {
  var wrap = g("itemsWrap");
  wrap.innerHTML = "";
  items.forEach(function(item) {
    var row = document.createElement("div");
    row.className = "irow";

    var inName  = document.createElement("input");
    var inQty   = document.createElement("input");
    var inUnit  = document.createElement("input");
    var inPrice = document.createElement("input");
    var btnDel  = document.createElement("button");

    inName.className  = "fi";
    inQty.className   = "fi";
    inUnit.className  = "fi";
    inPrice.className = "fi";
    btnDel.className  = "rbtn";

    inName.type   = "text";
    inQty.type    = "number";
    inUnit.type   = "text";
    inPrice.type  = "number";

    inName.value  = item.name;
    inQty.value   = item.qty;
    inUnit.value  = item.unit;
    inPrice.value = item.price;

    inName.placeholder  = "清掃作業費";
    inQty.min   = "0";
    inPrice.min = "0";

    btnDel.textContent = "×";

    // クロージャで id を束縛
    (function(itemId) {
      inName.addEventListener("input",  function() { updateItem(itemId, "name",  inName.value);  });
      inQty.addEventListener("input",   function() { updateItem(itemId, "qty",   inQty.value);   });
      inUnit.addEventListener("input",  function() { updateItem(itemId, "unit",  inUnit.value);  });
      inPrice.addEventListener("input", function() { updateItem(itemId, "price", inPrice.value); });
      btnDel.addEventListener("click",  function() { removeRow(itemId); });
    })(item.id);

    row.appendChild(inName);
    row.appendChild(inQty);
    row.appendChild(inUnit);
    row.appendChild(inPrice);
    row.appendChild(btnDel);
    wrap.appendChild(row);
  });
}

function updateItem(id, key, val) {
  var item = items.find(function(i) { return i.id === id; });
  if (item) { item[key] = val; calcTotal(); }
}

// ---------- 合計計算 ----------
function calcTotal() {
  var sub  = items.reduce(function(s, i) { return s + Number(i.qty) * Number(i.price); }, 0);
  var rate = Number(v("f_tax"));
  var tax  = Math.floor(sub * rate / 100);
  var tot  = sub + tax;
  g("t_sub").textContent   = "¥" + fmt(sub);
  g("t_tax").textContent   = "¥" + fmt(tax);
  g("t_total").textContent = "¥" + fmt(tot);
  return { sub: sub, tax: tax, tot: tot, rate: rate };
}

// ---------- 画面切替 ----------
function showEdit() {
  g("editView").style.display = "";
  g("pvView").style.display   = "none";
  g("btnEdit").style.background = TYPES[curType].color;
  g("btnPrev").style.background = "#334155";
}

function showPreview() {
  g("editView").style.display = "none";
  g("pvView").style.display   = "";
  g("btnEdit").style.background = "#334155";
  g("btnPrev").style.background = TYPES[curType].color;
  buildPreview();
}

// ---------- プレビュー構築 ----------
function buildPreview() {
  var info = TYPES[curType];
  var t    = calcTotal();

  g("pv_ttl").textContent       = info.label;
  g("pv_ttl").style.background  = info.color;
  g("pv_no").textContent        = "No. " + v("f_no");
  g("pv_date").textContent      = "発行日: " + v("f_date");

  var due = v("f_due");
  if (due && curType !== "receipt") {
    g("pv_due").style.display  = "";
    g("pv_due").textContent    = (curType === "invoice" ? "支払期限: " : "有効期限: ") + due;
  } else {
    g("pv_due").style.display  = "none";
  }

  sh("pv_ca", v("f_caddr"));
  g("pv_cn").textContent = v("f_cname") || "○○株式会社";
  g("pv_sn").textContent = v("f_sname");
  sh("pv_sa", v("f_saddr"));
  sh("pv_st", v("f_stel")   ? "TEL: " + v("f_stel") : "");
  sh("pv_se", v("f_semail"));
  if (curType === "invoice" || curType === "receipt") {
    g("pv_reg").style.display = "";
    g("pv_reg").textContent   = "登録番号 T3290001110543";
  } else {
    g("pv_reg").style.display = "none";
  }

  var subj = v("f_title");
  if (subj) {
    g("pv_subj").style.display          = "";
    g("pv_subj").textContent            = "件名: " + subj;
    g("pv_subj").style.background       = info.accent;
    g("pv_subj").style.borderLeftColor  = info.color;
  } else {
    g("pv_subj").style.display = "none";
  }

  g("pv_amtbox").style.borderColor = info.color;
  var amtLabels = { estimate: "お見積金額", invoice: "ご請求金額", receipt: "領収金額" };
  g("pv_amtl").textContent = amtLabels[curType] + "（税込）";
  g("pv_amt").textContent  = "¥" + fmt(t.tot);
  g("pv_amt").style.color  = info.color;

  g("pv_th").style.background = info.color;
  var tb = g("pv_tb");
  tb.innerHTML = "";
  items.filter(function(i) { return i.name; }).forEach(function(item, idx) {
    var amt = Number(item.qty) * Number(item.price);
    var tr  = document.createElement("tr");
    tr.style.background = idx % 2 === 0 ? "#fff" : "#f8fafc";
    var tds = [
      item.name,
      item.qty,
      item.unit,
      "¥" + fmt(item.price),
      "¥" + fmt(amt)
    ];
    tds.forEach(function(txt, ci) {
      var td = document.createElement("td");
      td.textContent = txt;
      if (ci > 0) td.style.textAlign = "right";
      tr.appendChild(td);
    });
    tb.appendChild(tr);
  });

  g("pv_sub").textContent   = "¥" + fmt(t.sub);
  g("pv_taxl").textContent  = "消費税（" + t.rate + "%）";
  g("pv_tax").textContent   = "¥" + fmt(t.tax);
  g("pv_tf").style.borderTopColor = info.color;
  g("pv_tf").style.color          = info.color;
  g("pv_tot").textContent   = "¥" + fmt(t.tot);

  var note = v("f_note");
  if (note) { g("pv_nts").style.display = ""; g("pv_ntt").textContent = note; }
  else       { g("pv_nts").style.display = "none"; }
}

// ---------- 印刷 ----------
function doPrint() {
  // まずプレビューに切り替え
  if (g("pvView").style.display === "none") {
    showPreview();
  }
  // スマホ判定
  var isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);
  if (isMobile) {
    // スマホはwindow.printが使えないブラウザが多いためガイド表示
    setTimeout(function() {
      alert("📄 PDF保存方法\n\n【Android】\nブラウザ右上メニュー → 印刷 → 送信先を「PDFに保存」\n\n【iPhone】\n共有ボタン → 「PDFを作成」または「プリント」→ピンチアウトでPDF保存");
    }, 300);
  } else {
    setTimeout(function() { window.print(); }, 300);
  }
}

// ---------- 起動 ----------
document.addEventListener("DOMContentLoaded", init);

})();
</script>
</body>
</html>
